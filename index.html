<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wareneingang Polfood GmbH</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:15px; margin:0; }
.box { background:white; padding:15px; max-width:900px; margin:auto; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2 { text-align:center; }

label { font-weight:bold; display:block; margin-top:10px; }

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  font-size:16px;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:black;
  color:white;
  border:none;
  border-radius:6px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  font-size:12px;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}

th { background:#eee; }

.dropdown { position:relative; }

.dropdown-list {
  position:absolute;
  width:100%;
  background:white;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  display:none;
  z-index:1000;
}

.dropdown-item {
  padding:10px;
  cursor:pointer;
}

.dropdown-item:hover { background:#eee; }

.action-btn {
  background:#c62828;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:4px;
  width:auto;
}

.photo-preview img {
  max-width:100%;
  max-height:150px;
  border-radius:8px;
}

.summary-box {
  margin-top:20px;
  background:#fafafa;
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
}

.summary-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚛 Wareneingang Polfood GmbH</h2>

<label>Datum</label>
<input type="date" id="datum">

<label>Produzent</label>
<div class="dropdown">
  <input id="produzent" placeholder="Produzent wählen oder eingeben">
  <div id="produzentList" class="dropdown-list"></div>
</div>

<label>Paletten Nr</label>
<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="pallnr">

<label>E2 IN</label>
<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="e2_in">

<label>H1 IN</label>
<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="h1_in">

<label>Einweg</label>
<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="einweg">

<label>EPAL</label>
<input type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" id="epal">

<label>Bemerkung</label>
<input id="bemerkung">

<label>Foto</label>
<input type="file" id="foto" accept="image/*" capture="environment">

<div class="photo-preview" id="previewBox" style="display:none;">
  <img id="preview">
</div>

<button onclick="addEntry()">➕ Eintrag speichern</button>
<button onclick="exportExcel()">📦 Excel exportieren</button>
<button onclick="clearData()">🗑️ Daten löschen</button>

<div class="summary-box">
<div class="summary-grid">
<div>E2 IN: <strong id="sum_e2_in">0</strong></div>
<div>H1 IN: <strong id="sum_h1_in">0</strong></div>
<div>Einweg: <strong id="sum_einweg">0</strong></div>
<div>EPAL: <strong id="sum_epal">0</strong></div>
</div>
</div>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Produzent</th>
<th>Pall Nr</th>
<th>E2 IN</th>
<th>H1 IN</th>
<th>Einweg</th>
<th>EPAL</th>
<th>Bemerkung</th>
<th>Foto</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>
const standardProduzenten = [
"Animex K4","Bimex","Bodama","Bomadek","Dasyzna",
"Gobarto","Indrol","OSI","Plukon","Podolski","Wipasz"
];

let data = JSON.parse(localStorage.getItem("wareneingang_data") || "[]");
let produzenten = JSON.parse(localStorage.getItem("produzenten_liste") || "null") || [...standardProduzenten];
let currentPhoto = null;

const input = document.getElementById("produzent");
const list = document.getElementById("produzentList");
const datumInput = document.getElementById("datum");

function setHeute(){
  const d = new Date();
  datumInput.value = d.toISOString().split("T")[0];
}
setHeute();

function save(){
  localStorage.setItem("wareneingang_data", JSON.stringify(data));
}

function saveProd(){
  localStorage.setItem("produzenten_liste", JSON.stringify(produzenten));
}

function renderList(filter=""){
  list.innerHTML="";
  produzenten.filter(p=>p.toLowerCase().includes(filter.toLowerCase()))
  .forEach(p=>{
    const div=document.createElement("div");
    div.textContent=p;
    div.className="dropdown-item";
    div.onclick=()=>{input.value=p; list.style.display="none";};
    list.appendChild(div);
  });
  list.style.display="block";
}

function addProduzent(val){
  const p=val.trim();
  if(p && !produzenten.some(x=>x.toLowerCase()===p.toLowerCase())){
    produzenten.push(p);
    saveProd();
  }
}

input.addEventListener("input",()=>renderList(input.value));
input.addEventListener("focus",()=>renderList(input.value));

document.addEventListener("click",(e)=>{
  if(!e.target.closest(".dropdown")) list.style.display="none";
});

document.getElementById("foto").addEventListener("change",(e)=>{
  const file=e.target.files[0];
  if(!file) return;
  currentPhoto=file;

  const reader=new FileReader();
  reader.onload=(ev)=>{
    document.getElementById("preview").src=ev.target.result;
    document.getElementById("previewBox").style.display="block";
  };
  reader.readAsDataURL(file);
});

const felder=["datum","produzent","pallnr","e2_in","h1_in","einweg","epal","bemerkung"];

felder.forEach((id,i)=>{
  document.getElementById(id).addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
      e.preventDefault();
      if(id==="produzent") addProduzent(input.value);
      if(felder[i+1]){
        document.getElementById(felder[i+1]).focus();
      } else {
        document.getElementById("foto").focus();
      }
    }
  });
});

function buildName(datum,prod,file){
  const clean=prod.replace(/[^a-z0-9]/gi,"_");
  const ext=file.name.split(".").pop();
  return `${datum}_${clean}.${ext}`;
}

function addEntry(){
  const datum=datumInput.value;
  const prod=input.value.trim();

  if(!datum || !prod){ alert("Bitte ausfüllen"); return; }

  addProduzent(prod);

  let fotoName="";
  if(currentPhoto){
    fotoName=buildName(datum,prod,currentPhoto);
    const url=URL.createObjectURL(currentPhoto);
    const a=document.createElement("a");
    a.href=url;
    a.download=fotoName;
    a.click();
  }

  data.push({
    datum,
    produzent:prod,
    pallnr:+document.getElementById("pallnr").value||0,
    e2_in:+document.getElementById("e2_in").value||0,
    h1_in:+document.getElementById("h1_in").value||0,
    einweg:+document.getElementById("einweg").value||0,
    epal:+document.getElementById("epal").value||0,
    bemerkung:document.getElementById("bemerkung").value,
    foto:fotoName
  });

  save();
  render();
  summen();

  document.querySelectorAll("input").forEach(i=>{ if(i.type!=="date") i.value=""; });
  currentPhoto=null;
  document.getElementById("previewBox").style.display="none";

  setHeute();
  input.focus();
}

function render(){
  const tbody=document.getElementById("table");
  tbody.innerHTML="";
  data.forEach((r,i)=>{
    tbody.innerHTML+=`
<tr>
<td>${r.datum}</td>
<td>${r.produzent}</td>
<td>${r.pallnr}</td>
<td>${r.e2_in}</td>
<td>${r.h1_in}</td>
<td>${r.einweg}</td>
<td>${r.epal}</td>
<td>${r.bemerkung||""}</td>
<td>${r.foto||""}</td>
<td><button class="action-btn" onclick="del(${i})">X</button></td>
</tr>`;
  });
}

function del(i){
  if(confirm("Löschen?")){
    data.splice(i,1);
    save();
    render();
    summen();
  }
}

function summen(){
  document.getElementById("sum_e2_in").textContent=data.reduce((a,b)=>a+b.e2_in,0);
  document.getElementById("sum_h1_in").textContent=data.reduce((a,b)=>a+b.h1_in,0);
  document.getElementById("sum_einweg").textContent=data.reduce((a,b)=>a+b.einweg,0);
  document.getElementById("sum_epal").textContent=data.reduce((a,b)=>a+b.epal,0);
}

function exportExcel(){
  const exportData=[...data];

  const sums={};
  data.forEach(r=>{
    if(!sums[r.produzent]) sums[r.produzent]={e2:0,h1:0,einweg:0,epal:0};
    sums[r.produzent].e2+=r.e2_in;
    sums[r.produzent].h1+=r.h1_in;
    sums[r.produzent].einweg+=r.einweg;
    sums[r.produzent].epal+=r.epal;
  });

  exportData.push({});
  Object.keys(sums).forEach(p=>{
    exportData.push({
      datum:"",
      produzent:"SUMME "+p,
      e2_in:sums[p].e2,
      h1_in:sums[p].h1,
      einweg:sums[p].einweg,
      epal:sums[p].epal
    });
  });

  const ws=XLSX.utils.json_to_sheet(exportData);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Wareneingang");

  XLSX.writeFile(wb,"Wareneingang.xlsx");
}

function clearData(){
  if(confirm("Alles löschen?")){
    data=[];
    save();
    render();
    summen();
  }
}

render();
summen();
</script>

</body>
</html>
