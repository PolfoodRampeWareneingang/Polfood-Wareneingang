<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spedition Rampe Tool (Web App)</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:15px; }
    .box { background:white; padding:15px; max-width:900px; margin:auto; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);} 
    h2 { text-align:center; }
    label { font-weight:bold; }
    input, select { width:100%; padding:10px; margin:6px 0; }
    button { width:100%; padding:12px; margin-top:10px; background:black; color:white; border:none; border-radius:6px; }
    table { width:100%; margin-top:20px; border-collapse:collapse; font-size:12px; }
    th, td { border:1px solid #ddd; padding:6px; text-align:center; }
    th { background:#eee; }

    .small { font-size:12px; color:gray; text-align:center; margin-top:10px; }
  </style>
</head>
<body>

<div class="box">
  <h2>🚛 Spedition Rampe Tool (Web App)</h2>
  <div class="small">Speichert automatisch im Browser (wie kleine App)</div>

  <label>Datum</label>
  <input type="date" id="datum">

 <label>Produzent</label>
 <label>Produzent</label>
<input list="produzentenListe" id="produzent" placeholder="Produzent wählen oder eingeben">

<datalist id="produzentenListe"></datalist>

<script>
// Standard-Produzenten (werden nur einmal gesetzt)
let produzenten = JSON.parse(localStorage.getItem("produzenten") || `[
  "Bomadek",
  "Bodama",
  "Podolski",
  "Bimex",
  "Animex K4",
  "Dasyzna",
  "OSI",
  "Indrol",
  "Gobarto",
  "Wipasz",
  "Plukon"
]`);

// Dropdown rendern (alphabetisch)
function renderProduzenten(){
  produzenten.sort((a,b)=>a.localeCompare(b));

  let list = document.getElementById("produzentenListe");
  list.innerHTML = "";

  produzenten.forEach(p => {
    list.innerHTML += `<option value="${p}">`;
  });
}

// neuen Produzenten automatisch speichern
function addProduzentIfNew(name){
  if(name && !produzenten.includes(name)){
    produzenten.push(name);
    localStorage.setItem("produzenten", JSON.stringify(produzenten));
    renderProduzenten();
  }
}

// initial laden
renderProduzenten();
</script>
  </select>

  <label>Paletten Nr</label>
  <input id="pallnr">

  <label>E2 IN</label>
  <input type="number" id="e2_in">

  <label>H1 IN</label>
  <input type="number" id="h1_in">

  <label>Einweg</label>
  <input type="number" id="einweg">

  <label>EPAL</label>
  <input type="number" id="epal">

  <label>E2 OUT</label>
  <input type="number" id="e2_out">

  <label>H1 OUT</label>
  <input type="number" id="h1_out">

  <button onclick="addEntry()">➕ Eintrag speichern</button>
  <button onclick="exportExcel()">📦 Excel Tagesbericht exportieren</button>
  <button onclick="clearData()">🗑️ Daten löschen</button>

  <table>
    <thead>
      <tr>
        <th>Datum</th>
        <th>Produzent</th>
        <th>Pall Nr</th>
        <th>E2 IN</th>
        <th>H1 IN</th>
        <th>Einweg</th>
        <th>EPAL</th>
        <th>E2 OUT</th>
        <th>H1 OUT</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("spedition_data") || "[]");

render();

function save() {
  localStorage.setItem("spedition_data", JSON.stringify(data));
}

function addEntry() {
  data.push({
    datum: document.getElementById('datum').value,
    produzent: document.getElementById('produzent').value,
    pallnr: document.getElementById('pallnr').value,
    e2_in: Number(document.getElementById('e2_in').value || 0),
    h1_in: Number(document.getElementById('h1_in').value || 0),
    einweg: Number(document.getElementById('einweg').value || 0),
    epal: Number(document.getElementById('epal').value || 0),
    e2_out: Number(document.getElementById('e2_out').value || 0),
    h1_out: Number(document.getElementById('h1_out').value || 0)
  });

  save();
  render();
}

function render() {
  let tbody = document.getElementById('table');
  tbody.innerHTML = '';

  data.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.datum}</td>
        <td>${r.produzent}</td>
        <td>${r.pallnr}</td>
        <td>${r.e2_in}</td>
        <td>${r.h1_in}</td>
        <td>${r.einweg}</td>
        <td>${r.epal}</td>
        <td>${r.e2_out}</td>
        <td>${r.h1_out}</td>
      </tr>
    `;
  });
}

function exportExcel() {
  if(data.length === 0){ alert("Keine Daten!"); return; }

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tagesbericht");

  let today = document.getElementById('datum').value || 'report';

  XLSX.writeFile(wb, `Tagesbericht_${today}.xlsx`);
}

function clearData(){
  if(confirm("Wirklich alle Daten löschen?")){
    data = [];
    save();
    render();
  }
}
</script>

</body>
</html>
