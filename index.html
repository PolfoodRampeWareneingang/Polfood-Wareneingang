<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Produzent Dropdown</title>

<style>
  .dropdown {
    position: relative;
    width: 250px;
    font-family: Arial;
  }

  .dropdown input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
  }

  .dropdown-list {
    position: absolute;
    width: 100%;
    border: 1px solid #ccc;
    border-top: none;
    max-height: 150px;
    overflow-y: auto;
    background: white;
    display: none;
    z-index: 1000;
  }

  .dropdown-item {
    padding: 8px;
    cursor: pointer;
  }

  .dropdown-item:hover {
    background: #f0f0f0;
  }
</style>
</head>
<body>

<label>Produzent</label>

<div class="dropdown">
  <input type="text" id="input" placeholder="Produzent wählen oder eingeben">
  <div id="list" class="dropdown-list"></div>
</div>

<script>
  let produzenten = [
    "Bomadek",
    "Bodama",
    "Podolski",
    "Bimex",
    "Animex K4",
    "Dasyzna",
    "OSI",
    "Indrol",
    "Gobarto",
    "Wipasz",
    "Plukon"
  ];

  const input = document.getElementById("input");
  const list = document.getElementById("list");

  function sortiereListe() {
    produzenten.sort((a, b) => a.localeCompare(b, "de", { sensitivity: "base" }));
  }

  function renderListe(filter = "") {
    list.innerHTML = "";

    const gefiltert = produzenten.filter(p =>
      p.toLowerCase().includes(filter.toLowerCase())
    );

    gefiltert.forEach(p => {
      const div = document.createElement("div");
      div.className = "dropdown-item";
      div.textContent = p;

      div.onclick = () => {
        input.value = p;
        list.style.display = "none";
      };

      list.appendChild(div);
    });

    list.style.display = gefiltert.length ? "block" : "none";
  }

  function addProduzent(value) {
    const val = value.trim();
    if (!val) return;

    const exists = produzenten.some(p => p.toLowerCase() === val.toLowerCase());

    if (!exists) {
      produzenten.push(val);
      sortiereListe();
    }
  }

  input.addEventListener("input", () => {
    renderListe(input.value);
  });

  input.addEventListener("focus", () => {
    renderListe(input.value);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      addProduzent(input.value);
      renderListe("");
    }
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".dropdown")) {
      list.style.display = "none";
    }
  });

  sortiereListe();
</script>

</body>
</html>
  <label>Paletten Nr</label>
  <input id="pallnr">

  <label>E2 IN</label>
  <input type="number" id="e2_in">

  <label>H1 IN</label>
  <input type="number" id="h1_in">

  <label>Einweg</label>
  <input type="number" id="einweg">

  <label>EPAL</label>
  <input type="number" id="epal">

  <label>E2 OUT</label>
  <input type="number" id="e2_out">

  <label>H1 OUT</label>
  <input type="number" id="h1_out">

  <button onclick="addEntry()">➕ Eintrag speichern</button>
  <button onclick="exportExcel()">📦 Excel Tagesbericht exportieren</button>
  <button onclick="clearData()">🗑️ Daten löschen</button>

  <table>
    <thead>
      <tr>
        <th>Datum</th>
        <th>Produzent</th>
        <th>Pall Nr</th>
        <th>E2 IN</th>
        <th>H1 IN</th>
        <th>Einweg</th>
        <th>EPAL</th>
        <th>E2 OUT</th>
        <th>H1 OUT</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("spedition_data") || "[]");

render();

function save() {
  localStorage.setItem("spedition_data", JSON.stringify(data));
}

function addEntry() {
  data.push({
    datum: document.getElementById('datum').value,
    produzent: document.getElementById('produzent').value,
    pallnr: document.getElementById('pallnr').value,
    e2_in: Number(document.getElementById('e2_in').value || 0),
    h1_in: Number(document.getElementById('h1_in').value || 0),
    einweg: Number(document.getElementById('einweg').value || 0),
    epal: Number(document.getElementById('epal').value || 0),
    e2_out: Number(document.getElementById('e2_out').value || 0),
    h1_out: Number(document.getElementById('h1_out').value || 0)
  });

  save();
  render();
}

function render() {
  let tbody = document.getElementById('table');
  tbody.innerHTML = '';

  data.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.datum}</td>
        <td>${r.produzent}</td>
        <td>${r.pallnr}</td>
        <td>${r.e2_in}</td>
        <td>${r.h1_in}</td>
        <td>${r.einweg}</td>
        <td>${r.epal}</td>
        <td>${r.e2_out}</td>
        <td>${r.h1_out}</td>
      </tr>
    `;
  });
}

function exportExcel() {
  if(data.length === 0){ alert("Keine Daten!"); return; }

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tagesbericht");

  let today = document.getElementById('datum').value || 'report';

  XLSX.writeFile(wb, `Tagesbericht_${today}.xlsx`);
}

function clearData(){
  if(confirm("Wirklich alle Daten löschen?")){
    data = [];
    save();
    render();
  }
}
</script>

</body>
</html>
