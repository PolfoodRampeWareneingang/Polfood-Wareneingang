<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wareneingang Polfood GmbH</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; padding:15px; }
.box { background:white; padding:15px; max-width:900px; margin:auto; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
h2 { text-align:center; }

label { font-weight:bold; display:block; margin-top:10px; }
input { width:100%; padding:10px; margin:6px 0; font-size:16px; box-sizing:border-box; }

button { width:100%; padding:12px; margin-top:10px; background:black; color:white; border:none; border-radius:6px; }

table { width:100%; margin-top:20px; border-collapse:collapse; font-size:12px; }
th, td { border:1px solid #ddd; padding:6px; text-align:center; }
th { background:#eee; }

.dropdown { position:relative; }
.dropdown-list {
  position:absolute; width:100%; background:white;
  border:1px solid #ccc; max-height:180px; overflow:auto;
  display:none; z-index:1000;
}
.dropdown-item { padding:10px; cursor:pointer; }
.dropdown-item:hover { background:#eee; }

.action-btn {
  background:#c62828; color:white; border:none;
  padding:6px 10px; border-radius:4px;
}

.photo-preview img {
  max-width:100%;
  max-height:150px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚛 Wareneingang Polfood GmbH</h2>

<label>Datum</label>
<input type="date" id="datum">

<label>Produzent</label>
<div class="dropdown">
  <input id="produzent" placeholder="Produzent wählen oder eingeben">
  <div id="produzentList" class="dropdown-list"></div>
</div>

<label>Paletten Nr</label>
<input id="pallnr">

<label>E2 IN</label>
<input id="e2_in">

<label>H1 IN</label>
<input id="h1_in">

<label>Einweg</label>
<input id="einweg">

<label>EPAL</label>
<input id="epal">

<label>E2 OUT</label>
<input id="e2_out">

<label>H1 OUT</label>
<input id="h1_out">

<label>Bemerkung</label>
<input id="bemerkung">

<label>Foto</label>
<input type="file" id="foto" accept="image/*" capture="environment">

<div class="photo-preview" id="previewBox" style="display:none;">
  <img id="preview">
</div>

<button onclick="addEntry()">➕ Eintrag speichern</button>
<button onclick="exportExcel()">📦 Excel exportieren</button>
<button onclick="clearData()">🗑️ Daten löschen</button>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Produzent</th>
<th>Pall Nr</th>
<th>E2 IN</th>
<th>H1 IN</th>
<th>Einweg</th>
<th>EPAL</th>
<th>E2 OUT</th>
<th>H1 OUT</th>
<th>Bemerkung</th>
<th>Foto</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>
const standardProduzenten = [
"Animex K4","Bimex","Bodama","Bomadek","Dasyzna",
"Gobarto","Indrol","OSI","Plukon","Podolski","Wipasz"
];

let data = JSON.parse(localStorage.getItem("data") || "[]");
let produzenten = JSON.parse(localStorage.getItem("prod") || "null") || [...standardProduzenten];

const input = document.getElementById("produzent");
const list = document.getElementById("produzentList");

let currentPhoto = null;

function save(){ localStorage.setItem("data", JSON.stringify(data)); }
function saveProd(){ localStorage.setItem("prod", JSON.stringify(produzenten)); }

function renderList(filter=""){
list.innerHTML="";
produzenten
.filter(p=>p.toLowerCase().includes(filter.toLowerCase()))
.forEach(p=>{
  const div=document.createElement("div");
  div.textContent=p;
  div.className="dropdown-item";
  div.onclick=()=>{input.value=p; list.style.display="none";}
  list.appendChild(div);
});
list.style.display="block";
}

input.addEventListener("input",()=>renderList(input.value));
input.addEventListener("focus",()=>renderList(input.value));
document.addEventListener("click",(e)=>{ if(!e.target.closest(".dropdown")) list.style.display="none"; });

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
  const val=input.value.trim();
  if(val && !produzenten.includes(val)){
    produzenten.push(val);
    saveProd();
  }
}
});

document.getElementById("foto").addEventListener("change",(e)=>{
const file=e.target.files[0];
if(!file) return;
currentPhoto=file;

const reader=new FileReader();
reader.onload=(ev)=>{
  document.getElementById("preview").src=ev.target.result;
  document.getElementById("previewBox").style.display="block";
};
reader.readAsDataURL(file);
});

function buildName(datum,prod,file){
const clean=prod.replace(/[^a-z0-9]/gi,"_");
const time=new Date().toISOString().replace(/[:.]/g,"");
const ext=file.name.split(".").pop();
return `${datum}_${clean}_${time}.${ext}`;
}

function downloadPhoto(file,name){
const url=URL.createObjectURL(file);
const a=document.createElement("a");
a.href=url;
a.download=name;
a.click();
URL.revokeObjectURL(url);
}

function addEntry(){
const datum=document.getElementById("datum").value;
const prod=input.value.trim();

if(!datum || !prod){ alert("Bitte ausfüllen"); return; }

let fotoName="";
if(currentPhoto){
  fotoName=buildName(datum,prod,currentPhoto);
  downloadPhoto(currentPhoto,fotoName);
}

data.push({
datum,
produzent:prod,
pallnr:document.getElementById("pallnr").value,
e2_in:document.getElementById("e2_in").value,
h1_in:document.getElementById("h1_in").value,
einweg:document.getElementById("einweg").value,
epal:document.getElementById("epal").value,
e2_out:document.getElementById("e2_out").value,
h1_out:document.getElementById("h1_out").value,
bemerkung:document.getElementById("bemerkung").value,
foto:fotoName
});

save();
render();

document.querySelectorAll("input").forEach(i=>i.value="");
currentPhoto=null;
document.getElementById("previewBox").style.display="none";
}

function render(){
const tbody=document.getElementById("table");
tbody.innerHTML="";

data.forEach((r,i)=>{
tbody.innerHTML+=`
<tr>
<td>${r.datum}</td>
<td>${r.produzent}</td>
<td>${r.pallnr}</td>
<td>${r.e2_in}</td>
<td>${r.h1_in}</td>
<td>${r.einweg}</td>
<td>${r.epal}</td>
<td>${r.e2_out}</td>
<td>${r.h1_out}</td>
<td>${r.bemerkung}</td>
<td>${r.foto||""}</td>
<td><button class="action-btn" onclick="del(${i})">X</button></td>
</tr>`;
});
}

function del(i){
if(confirm("Löschen?")){
data.splice(i,1);
save();
render();
}
}

function exportExcel(){
if(data.length===0){alert("Keine Daten");return;}
const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Report");
XLSX.writeFile(wb,"Wareneingang.xlsx");
}

function clearData(){
if(confirm("Alles löschen?")){
data=[];
save();
render();
}
}

render();
</script>

</body>
</html>
